on:
  push:
  workflow_dispatch:

permissions:
  copilot-requests: write

jobs:
  copilot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: austenstone/copilot-cli@notoken
        with:
          prompt: |
            Who are you?

            What is your plan?
            
            What tools do you have? Will you use them?

            Can you test out some github mcp tools?
